name: ArgoCD diff preview
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
      argocd-namespace:
        description: "Namespace of the dedicated ArgoCD instance for diff rendering"
        required: false
        type: string
        default: "argocd-diff-preview"

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ghcr.io/bl4ko/ci-tools:latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: base-branch

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          path: target-branch

      - name: Get ArgoCD auth token
        id: argocd-auth
        env:
          ARGOCD_NS: ${{ inputs.argocd-namespace }}
        run: |
          ARGOCD_SERVER="argocd-diff-preview-server.${ARGOCD_NS}.svc.cluster.local"
          PASSWORD=$(kubectl get secret argocd-initial-admin-secret -n "$ARGOCD_NS" -o jsonpath='{.data.password}' | base64 -d)
          TOKEN=$(curl -s "http://${ARGOCD_SERVER}/api/v1/session" \
            -d "{\"username\":\"admin\",\"password\":\"${PASSWORD}\"}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run argocd-diff-preview
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARGOCD_NS: ${{ inputs.argocd-namespace }}
        run: |
          argocd-diff-preview \
            --repo "$REPO" \
            --base-branch main \
            --target-branch "refs/pull/${PR_NUMBER}/merge" \
            --argocd-namespace "$ARGOCD_NS" \
            --create-cluster=false \
            --render-method=server-api \
            --argocd-auth-token "${{ steps.argocd-auth.outputs.token }}" \
            --timeout 300
        continue-on-error: true

      - name: Post diff as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          DIFF_FILE="output/diff.md"

          if [ ! -f "$DIFF_FILE" ]; then
            echo "No diff output found, skipping PR comment."
            exit 0
          fi

          CONTENT=$(head -c 60000 "$DIFF_FILE")

          BODY="## ArgoCD Diff Preview

          ${CONTENT}"

          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "$BODY" \
            --edit-last 2>/dev/null || \
          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "$BODY"
