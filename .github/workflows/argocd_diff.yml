name: ArgoCD diff preview
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
      argocd-namespace:
        description: "Namespace of the dedicated ArgoCD instance for diff rendering"
        required: false
        type: string
        default: "argocd-diff-preview"

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ghcr.io/bl4ko/ci-tools:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run argocd-diff-preview
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARGOCD_NS: ${{ inputs.argocd-namespace }}
        run: |
          git config --global --add safe.directory "$PWD"

          argocd-diff-preview \
            --repo "$REPO" \
            --base-branch main \
            --target-branch "refs/pull/${PR_NUMBER}/merge" \
            --argocd-namespace "$ARGOCD_NS" \
            --create-cluster=false \
            --timeout 300
        continue-on-error: true

      - name: Post diff as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          DIFF_FILE="output/diff.md"

          if [ ! -f "$DIFF_FILE" ]; then
            echo "No diff output found, skipping PR comment."
            exit 0
          fi

          # Truncate if too large for GitHub comment (max 65536 chars)
          CONTENT=$(head -c 60000 "$DIFF_FILE")

          BODY="## ArgoCD Diff Preview

          ${CONTENT}"

          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "$BODY" \
            --edit-last 2>/dev/null || \
          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "$BODY"
