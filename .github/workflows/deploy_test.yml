name: ArgoCD deploy test on CI cluster
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
      sync-timeout:
        description: "Timeout in seconds for ArgoCD app sync"
        required: false
        type: number
        default: 300

permissions:
  contents: read

jobs:
  deploy-test:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ghcr.io/bl4ko/ci-tools:latest@sha256:49d32abc81fe0b3da43ebe201cbfaaab0b5725e68699e1d7805f33134e2b8d79
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "Not a pull request event, skipping."
            echo "apps=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config --global --add safe.directory "$PWD"

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          APPS=""
          for app_file in $(find . -path '*/apps/*.yml' -o -path '*/apps/*.yaml' | grep -v kustomization | sort); do
            REL_PATH=$(echo "$app_file" | sed 's|^\./||')

            # Skip apps with ci/skip-deploy-test annotation
            SKIP=$(yq '.metadata.annotations["ci/skip-deploy-test"] // ""' "$app_file" 2>/dev/null)
            if [ "$SKIP" = "true" ]; then
              echo "Skipping app: $app_file (ci/skip-deploy-test annotation)"
              continue
            fi

            # Match if the app file itself changed
            if echo "$CHANGED_FILES" | grep -qx "$REL_PATH"; then
              APPS="$APPS $app_file"
              echo "Matched app: $app_file (app file changed)"
              continue
            fi

            # Match if any resource path referenced by this app changed
            APP_PATHS=$(grep -oE '[a-z]+/resources/[a-zA-Z0-9_/-]+' "$app_file" 2>/dev/null | sort -u)
            for path in $APP_PATHS; do
              if echo "$CHANGED_FILES" | grep -q "^${path}"; then
                if ! echo "$APPS" | grep -q "$app_file"; then
                  APPS="$APPS $app_file"
                  echo "Matched app: $app_file via path: $path"
                fi
              fi
            done
          done

          APPS=$(echo "$APPS" | xargs)
          echo "Detected apps: $APPS"
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"

      - name: Create temporary ArgoCD Applications
        id: create
        if: steps.detect.outputs.apps != ''
        env:
          APPS: ${{ steps.detect.outputs.apps }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CREATED_APPS=""
          CREATED_NAMESPACES=""

          for app_file in $APPS; do
            APP_NAME=$(yq '.metadata.name' "$app_file")
            TEMP_NAME="ci-pr${PR_NUMBER}-${APP_NAME}"
            echo ""
            echo "=== Creating temp app: $TEMP_NAME (from $app_file) ==="

            # Get original namespace for unique temp namespace
            ORIG_NS=$(yq '.spec.destination.namespace // "default"' "$app_file")
            TEMP_NS="ci-pr${PR_NUMBER}-${ORIG_NS}"

            # Transform: rename, set ci-test project, unique namespace, disable selfHeal
            yq eval "
              .metadata.name = \"${TEMP_NAME}\" |
              .metadata.namespace = \"argocd\" |
              .spec.project = \"ci-test\" |
              .spec.destination.namespace = \"${TEMP_NS}\" |
              .spec.syncPolicy.automated = {\"prune\": true, \"selfHeal\": false} |
              .spec.syncPolicy.syncOptions += [\"CreateNamespace=true\"] |
              .spec.revisionHistoryLimit = 1
            " "$app_file" > "/tmp/${TEMP_NAME}.yaml"

            # Point git sources referencing this repo to the PR branch
            yq eval -i "
              (.spec.sources[] | select(.repoURL | test(\"gitops-home\")) | .targetRevision) = \"${PR_BRANCH}\"
            " "/tmp/${TEMP_NAME}.yaml" 2>/dev/null || true

            # Handle single source pattern
            HAS_SINGLE=$(yq '.spec.source.repoURL // ""' "/tmp/${TEMP_NAME}.yaml" 2>/dev/null)
            if echo "$HAS_SINGLE" | grep -q "gitops-home"; then
              yq eval -i ".spec.source.targetRevision = \"${PR_BRANCH}\"" "/tmp/${TEMP_NAME}.yaml"
            fi

            echo "--- Generated manifest ---"
            cat "/tmp/${TEMP_NAME}.yaml"
            echo "---"

            kubectl apply -f "/tmp/${TEMP_NAME}.yaml" -n argocd || {
              echo "::error::Failed to create ArgoCD app $TEMP_NAME"
              continue
            }

            CREATED_APPS="$CREATED_APPS $TEMP_NAME"
            CREATED_NAMESPACES="$CREATED_NAMESPACES $TEMP_NS"
          done

          CREATED_APPS=$(echo "$CREATED_APPS" | xargs)
          CREATED_NAMESPACES=$(echo "$CREATED_NAMESPACES" | xargs)
          echo "Created apps: $CREATED_APPS"
          echo "Created namespaces: $CREATED_NAMESPACES"
          echo "created_apps=$CREATED_APPS" >> "$GITHUB_OUTPUT"
          echo "created_namespaces=$CREATED_NAMESPACES" >> "$GITHUB_OUTPUT"

      - name: Wait for ArgoCD sync
        if: steps.create.outputs.created_apps != ''
        env:
          CREATED_APPS: ${{ steps.create.outputs.created_apps }}
          SYNC_TIMEOUT: ${{ inputs.sync-timeout }}
        run: |
          FAILED=0
          DEADLINE=$(($(date +%s) + SYNC_TIMEOUT))

          for app in $CREATED_APPS; do
            echo ""
            echo "=== Waiting for $app ==="

            while true; do
              NOW=$(date +%s)
              if [ "$NOW" -ge "$DEADLINE" ]; then
                echo "::error::Timeout waiting for $app to sync"
                kubectl get app "$app" -n argocd -o yaml 2>/dev/null | head -80
                FAILED=1
                break
              fi

              SYNC=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null)
              HEALTH=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null)
              PHASE=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.operationState.phase}' 2>/dev/null)
              MSG=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.operationState.message}' 2>/dev/null)

              echo "  sync=$SYNC health=$HEALTH phase=$PHASE"

              # Sync operation failed (template error, invalid manifests, etc.)
              if [ "$PHASE" = "Failed" ] || [ "$PHASE" = "Error" ]; then
                echo "::error::App $app sync failed: $MSG"
                FAILED=1
                break
              fi

              # Sync operation succeeded — accept any health and sync status
              # OutOfSync can occur legitimately in CI (hardcoded namespaces in
              # raw YAML, controller mutations, etc.). phase=Succeeded confirms
              # ArgoCD could template and apply the manifests.
              if [ "$PHASE" = "Succeeded" ]; then
                echo "App $app sync operation succeeded (sync: $SYNC, health: $HEALTH)"
                break
              fi

              sleep 10
            done
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "=== Summary ==="
            for app in $CREATED_APPS; do
              SYNC=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null)
              HEALTH=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null)
              PHASE=$(kubectl get app "$app" -n argocd -o jsonpath='{.status.operationState.phase}' 2>/dev/null)
              echo "  $app: sync=$SYNC health=$HEALTH phase=$PHASE"
            done
            exit 1
          fi

          echo "All apps synced successfully."

      - name: Cleanup temporary apps
        if: always() && steps.create.outputs.created_apps != ''
        env:
          CREATED_APPS: ${{ steps.create.outputs.created_apps }}
          CREATED_NAMESPACES: ${{ steps.create.outputs.created_namespaces }}
        run: |
          echo "Cleaning up temporary ArgoCD apps..."
          for app in $CREATED_APPS; do
            echo "Deleting $app..."
            kubectl delete app "$app" -n argocd --timeout=120s 2>/dev/null || {
              echo "Delete timed out for $app, removing finalizers..."
              kubectl patch app "$app" -n argocd --type=json \
                -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
              kubectl delete app "$app" -n argocd --ignore-not-found 2>/dev/null || true
            }
          done
          echo "Cleaning up temporary namespaces..."
          for ns in $CREATED_NAMESPACES; do
            echo "Deleting namespace $ns..."
            kubectl delete namespace "$ns" --ignore-not-found --timeout=60s 2>/dev/null || true
          done
          echo "Cleanup complete."
