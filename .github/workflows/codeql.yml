name: CodeQL
permissions:
  security-events: write
  contents: read
on:
  push:
  schedule:
    - cron: "0 6 * * 1"
jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: actions
      - uses: github/codeql-action/analyze@v3
