name: Scan container image with OSV-Scanner
on:
  workflow_call:
    inputs:
      containerfile:
        description: |
          Path to the Containerfile. The image will be built and then scanned.
        required: true
        type: string
      image-tag:
        description: 'Tag for the built image.'
        required: false
        type: string
        default: 'test'
      fail-on-severity:
        description: 'The minimum severity to fail the scan on. Can be one of: critical, high, medium, low.'
        required: false
        type: string
        default: 'high'
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=google/osv-scanner
  OSV_SCANNER_VERSION: v2.3.8

jobs:
  build-and-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build image
        id: build
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          CONTAINERFILE: ${{ inputs.containerfile }}
        run: |
          IMAGE_NAME="osv-scan-target:${IMAGE_TAG}"

          echo "Building image: $IMAGE_NAME"
          docker build -f "$CONTAINERFILE" -t "$IMAGE_NAME" "$(dirname "$CONTAINERFILE")"

          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install OSV-Scanner
        run: |
          curl -fsSL -o "$RUNNER_TEMP/osv-scanner" \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          chmod +x "$RUNNER_TEMP/osv-scanner"

      - name: Scan Image
        shell: bash
        env:
          IMAGE: ${{ steps.build.outputs.image }}
          FAIL_THRESHOLD: ${{ inputs.fail-on-severity }}
        run: |
          echo "Scanning image: $IMAGE"
          # Human-readable log (non-gating) + machine-readable JSON for the gate.
          "$RUNNER_TEMP/osv-scanner" scan image "$IMAGE" || true
          # Exit 0 = clean, 1 = vulns found; anything else means osv-scanner
          # could not scan -> fail closed.
          set +e
          "$RUNNER_TEMP/osv-scanner" scan image "$IMAGE" \
            --format json --output osv-results.json
          code=$?
          set -e
          case "$code" in
            0|1) ;;
            *) echo "::error::osv-scanner could not scan image (exit $code)"; exit "$code" ;;
          esac

          cat > "$RUNNER_TEMP/osv_gate.py" <<'PYEOF'
          import json, sys
          ORDER = {"low": 0, "medium": 1, "high": 2, "critical": 3}

          def bucket_score(s):
              try: v = float(s)
              except (TypeError, ValueError): return None
              if v >= 9.0: return "critical"
              if v >= 7.0: return "high"
              if v >= 4.0: return "medium"
              return "low" if v > 0 else None

          def bucket_label(l):
              if not l: return None
              l = l.strip().upper()
              if l == "MODERATE": return "medium"
              return l.lower() if l.lower() in ORDER else None

          def fixable(v):
              for a in v.get("affected", []):
                  for r in a.get("ranges", []):
                      for e in r.get("events", []):
                          if e.get("fixed"): return True
              return False

          path, thr = sys.argv[1], sys.argv[2].lower()
          if thr not in ORDER:
              print(f"::error::invalid threshold '{thr}'"); sys.exit(2)
          try:
              data = json.load(open(path, encoding="utf-8"))
          except (OSError, ValueError) as e:
              print(f"::error::no parseable scan results ({e}); failing closed"); sys.exit(2)

          blocking, warnings = [], []
          for res in data.get("results", []):
              src = res.get("source", {}).get("path", "")
              for pkg in res.get("packages", []):
                  name = pkg.get("package", {}).get("name", "?")
                  ver = pkg.get("package", {}).get("version", "?")
                  score = {i: g.get("max_severity") for g in pkg.get("groups", []) for i in g.get("ids", [])}
                  for v in pkg.get("vulnerabilities", []):
                      vid = v.get("id", "?")
                      sev = bucket_score(score.get(vid)) or bucket_label(v.get("database_specific", {}).get("severity"))
                      fx = fixable(v)
                      # Fail closed: a fixable vuln with no parseable severity blocks.
                      rank = ORDER[thr] if (fx and sev is None) else ORDER.get(sev or '', -1)
                      loc = f" [{src}]" if src else ""
                      line = f"  {sev or 'unknown':<8} {'fixable' if fx else 'no-fix':<7} {name}@{ver} {vid}{loc}"
                      (blocking if fx and rank >= ORDER[thr] else warnings).append(line)

          if warnings:
              print(f"::group::OSV warnings (not blocking) - {len(warnings)}")
              print("\n".join(warnings)); print("::endgroup::")
          if blocking:
              print(f"::error::OSV gate: {len(blocking)} fixable {thr}+ vuln(s) must be patched:")
              print("\n".join(blocking)); sys.exit(1)
          print(f"OSV gate passed: no fixable {thr}+ vulnerabilities ({len(warnings)} warning(s) ignored).")
          PYEOF
          python3 "$RUNNER_TEMP/osv_gate.py" osv-results.json "$FAIL_THRESHOLD"
