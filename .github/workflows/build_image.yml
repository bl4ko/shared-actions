name: Builds container image with cache
on:
  workflow_call:
    inputs:
      context:
        description: Context for the build (default ".")
        required: true
        type: string
        default: .
      file:
        description: Path to the Dockerfile. (default Dockerfile)
        required: false
        type: string
        default: Dockerfile
      tags:
        description: Comma separated list of tags (name/app:latest,name/app:1.0.0)
        required: true
        type: string
      push:
        description: Whether to push the image (default true)
        required: false
        type: boolean
        default: true
      cache-repo:
        description: Registry repository to use for caching
        required: false
        type: string
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
permissions:
  contents: read
  packages: write
jobs:
  build-and-scan:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ghcr.io/bl4ko/ci-tools:latest@sha256:d80a9ac59ec2e8c3df4707bbada558acaf320f732957ba76d2022ea82b38dcfe
    steps:
      - name: Build and Push with Kaniko
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN_VAL: ${{ secrets.GITHUB_TOKEN }}
          TAGS: ${{ inputs.tags }}
          PUSH: ${{ inputs.push }}
          CACHE_REPO_INPUT: ${{ inputs.cache-repo }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.file }}
          GIT_USERNAME: ${{ github.actor }}
          GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /kaniko/.docker
          echo "{\"auths\":{\"ghcr.io\":{\"username\":\"$GH_ACTOR\",\"password\":\"$GH_TOKEN_VAL\"}}}" > /kaniko/.docker/config.json

          DESTINATIONS=""
          CLEAN_TAGS=$(echo "$TAGS" | tr ',' ' ')
          FIRST_TAG=""
          for tag in $CLEAN_TAGS; do
            if [ -z "$FIRST_TAG" ]; then FIRST_TAG=$tag; fi
            DESTINATIONS="$DESTINATIONS --destination $tag"
          done

          PUSH_FLAG=""
          if [ "$PUSH" = "false" ]; then
             PUSH_FLAG="--no-push"
          fi

          CACHE_FLAGS=""
          if [ "$PUSH" != "false" ]; then
             CACHE_REPO="$CACHE_REPO_INPUT"
             if [ -z "$CACHE_REPO" ]; then
                BASE_IMAGE=$(echo "$FIRST_TAG" | cut -d: -f1)
                CACHE_REPO="${BASE_IMAGE}/cache"
             fi
             CACHE_FLAGS="--cache=true --cache-repo $CACHE_REPO"
          fi

          echo "Running Kaniko Build..."
          /usr/local/bin/executor \
            --context "git://github.com/${REPO}#${COMMIT_SHA}" \
            --context-sub-path "$CONTEXT" \
            --dockerfile "$DOCKERFILE" \
            $DESTINATIONS \
            $PUSH_FLAG \
            $CACHE_FLAGS \
            --force
