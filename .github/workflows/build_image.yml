name: Builds container image with cache
on:
  workflow_call:
    inputs:
      context:
        description: Context for the build (default ".")
        required: false
        type: string
        default: .
      file:
        description: Path to the Dockerfile relative to context (default Dockerfile)
        required: false
        type: string
        default: Dockerfile
      tags:
        description: Comma separated list of tags (name/app:latest,name/app:1.0.0)
        required: true
        type: string
      push:
        description: Whether to push the image (default true)
        required: false
        type: boolean
        default: true
      cache-repo:
        description: Registry repository to use for caching
        required: false
        type: string
      runs-on:
        required: false
        type: string
        default: "bare-metal-builder"
      platform:
        description: Target platform (default linux/amd64)
        required: false
        type: string
        default: "linux/amd64"
      harbor-tags:
        description: Comma-separated Harbor tags to also push (e.g. harbor.xqx.uk/apps/slocar/api:sha,...:latest). Empty = GHCR only.
        required: false
        type: string
        default: ""
      sign:
        description: Cosign-sign the pushed Harbor image by digest (needs COSIGN_* secrets)
        required: false
        type: boolean
        default: false
      buildkit-addr:
        description: "Remote BuildKit daemon address (tcp://...); enables the remote buildx driver over mTLS. Empty = standard local buildx."
        required: false
        type: string
        default: ""
    secrets:
      HARBOR_ROBOT_USER:
        required: false
      HARBOR_ROBOT_TOKEN:
        required: false
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false
      BUILDKIT_CLIENT_CERT:
        required: false
      BUILDKIT_CLIENT_KEY:
        required: false
      BUILDKIT_CA_CERT:
        required: false
permissions:
  contents: read
  packages: write
jobs:
  build-and-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        if: inputs.buildkit-addr == ''
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx (standard)
        if: inputs.buildkit-addr == ''
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up Docker Buildx (remote buildkit)
        if: inputs.buildkit-addr != ''
        env:
          BUILDKIT_CLIENT_CERT: ${{ secrets.BUILDKIT_CLIENT_CERT }}
          BUILDKIT_CLIENT_KEY: ${{ secrets.BUILDKIT_CLIENT_KEY }}
          BUILDKIT_CA_CERT: ${{ secrets.BUILDKIT_CA_CERT }}
        run: |
          CERT_DIR="/home/runner/buildkit-certs"
          if [ -f "${CERT_DIR}/tls.crt" ]; then
            CLIENT_CERT="${CERT_DIR}/tls.crt"
            CLIENT_KEY="${CERT_DIR}/tls.key"
            CA_CERT="${CERT_DIR}/ca.crt"
          else
            CERT_DIR="$(mktemp -d)"
            printf '%s' "${BUILDKIT_CLIENT_CERT}" > "${CERT_DIR}/tls.crt"
            printf '%s' "${BUILDKIT_CLIENT_KEY}"  > "${CERT_DIR}/tls.key"
            printf '%s' "${BUILDKIT_CA_CERT}"     > "${CERT_DIR}/ca.crt"
            chmod 600 "${CERT_DIR}/tls.crt" "${CERT_DIR}/tls.key" "${CERT_DIR}/ca.crt"
            CLIENT_CERT="${CERT_DIR}/tls.crt"
            CLIENT_KEY="${CERT_DIR}/tls.key"
            CA_CERT="${CERT_DIR}/ca.crt"
          fi
          docker buildx create \
            --name remote-buildkit \
            --driver remote \
            --driver-opt "cert=${CLIENT_CERT}" \
            --driver-opt "key=${CLIENT_KEY}" \
            --driver-opt "cacert=${CA_CERT}" \
            --use \
            "${{ inputs.buildkit-addr }}"
          docker buildx inspect --bootstrap

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Harbor
        if: inputs.push && inputs.harbor-tags != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: harbor.xqx.uk
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Determine cache repo
        id: cache
        if: inputs.push
        run: |
          CACHE_REPO="${{ inputs.cache-repo }}"
          if [ -z "$CACHE_REPO" ]; then
            FIRST_TAG=$(echo "${{ inputs.tags }}" | tr ',' '\n' | head -1)
            BASE_IMAGE=$(echo "$FIRST_TAG" | cut -d: -f1)
            CACHE_REPO="${BASE_IMAGE}/cache"
          fi
          echo "repo=$CACHE_REPO" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.file }}
          push: ${{ inputs.push }}
          # GHCR tags always; append Harbor tags (same build, pushed to both) when provided.
          tags: ${{ inputs.harbor-tags != '' && format('{0},{1}', inputs.tags, inputs.harbor-tags) || inputs.tags }}
          platforms: ${{ inputs.push && inputs.platform || '' }}
          cache-from: ${{ inputs.push && format('type=registry,ref={0}', steps.cache.outputs.repo) || '' }}
          cache-to: ${{ inputs.push && format('type=registry,ref={0},mode=max', steps.cache.outputs.repo) || '' }}

      - name: Install cosign
        if: inputs.push && inputs.sign && inputs.harbor-tags != ''
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Harbor images (key-based, by digest)
        if: inputs.push && inputs.sign && inputs.harbor-tags != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # Sign each pushed Harbor image by its immutable manifest digest (one sig covers all
          # tags of that image). Strip the :tag, dedupe, so a name isn't signed twice.
          echo "${{ inputs.harbor-tags }}" | tr ',' '\n' | sed 's/:[^/]*$//' | sort -u | while read -r name; do
            [ -z "$name" ] && continue
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "${name}@${DIGEST}"
          done
