name: Builds container image with cache
on:
  workflow_call:
    inputs:
      context:
        description: Context for the build (default ".")
        required: true
        type: string
        default: .
      file:
        description: Path to the Dockerfile relative to context (default Dockerfile)
        required: false
        type: string
        default: Dockerfile
      tags:
        description: Comma separated list of tags (name/app:latest,name/app:1.0.0)
        required: true
        type: string
      push:
        description: Whether to push the image (default true)
        required: false
        type: boolean
        default: true
      cache-repo:
        description: Registry repository to use for caching
        required: false
        type: string
      runs-on:
        required: false
        type: string
        default: "bare-metal-builder"
      platform:
        description: Target platform (default linux/amd64)
        required: false
        type: string
        default: "linux/amd64"
permissions:
  contents: read
  packages: write
jobs:
  build-and-scan:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine cache repo
        id: cache
        if: inputs.push
        run: |
          CACHE_REPO="${{ inputs.cache-repo }}"
          if [ -z "$CACHE_REPO" ]; then
            FIRST_TAG=$(echo "${{ inputs.tags }}" | tr ',' '\n' | head -1)
            BASE_IMAGE=$(echo "$FIRST_TAG" | cut -d: -f1)
            CACHE_REPO="${BASE_IMAGE}/cache"
          fi
          echo "repo=$CACHE_REPO" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.file }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
          platforms: ${{ inputs.platform }}
          cache-from: ${{ inputs.push && format('type=registry,ref={0}', steps.cache.outputs.repo) || '' }}
          cache-to: ${{ inputs.push && format('type=registry,ref={0},mode=max', steps.cache.outputs.repo) || '' }}
