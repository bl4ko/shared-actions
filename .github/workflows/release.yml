name: Create Release 🚀
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      SVC_TOKEN: # Token for service account
        required: true
jobs:
  release:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: node:lts-alpine3.23@sha256:01743339035a5c3c11a373cd7c83aeab6ed1457b55da6a69e014a95ac4e4700b
    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.SVC_TOKEN }}
        run: npx semantic-release@24.2.1
