name: Scan container images with OSV-Scanner
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
      fail-on-severity:
        description: "Minimum severity to fail on: critical, high, medium, low"
        required: false
        type: string
        default: "critical"
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

permissions:
  contents: read
  packages: read

jobs:
  scan:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ghcr.io/bl4ko/ci-tools:latest@sha256:c39a933e7e9fe2590dfef340dd896f298c59692b103ea4c9bfe375ae4c3e4ded
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: crane auth login ghcr.io -u "$GITHUB_ACTOR" -p "$GITHUB_TOKEN"

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: crane auth login docker.io -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"

      - name: Extract and scan image references
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          FAIL_THRESHOLD: ${{ inputs.fail-on-severity }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "Not a pull request event, skipping."
            exit 0
          fi

          git config --global --add safe.directory "$PWD"

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.yml' '*.yaml')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No YAML files changed."
            exit 0
          fi

          # Extract images from HEAD version of changed files
          HEAD_IMAGES=$(echo "$CHANGED_FILES" | xargs grep -hE '^\s*(image|value):\s*\S+' 2>/dev/null \
            | grep -oE '[a-zA-Z0-9._/-]+:[a-zA-Z0-9._-]+' \
            | grep -E '^[a-z]' \
            | grep -vE '^\s*#' \
            | grep '/' \
            | sort -u || true)

          if [ -z "$HEAD_IMAGES" ]; then
            echo "No image references found in changed files."
            exit 0
          fi

          # Extract images from BASE version of the same files to find what already existed
          BASE_IMAGES=""
          for f in $CHANGED_FILES; do
            BASE_IMAGES+=$(git show "$BASE_SHA:$f" 2>/dev/null \
              | grep -hE '^\s*(image|value):\s*\S+' 2>/dev/null \
              | grep -oE '[a-zA-Z0-9._/-]+:[a-zA-Z0-9._-]+' \
              | grep -E '^[a-z]' \
              | grep -vE '^\s*#' \
              | grep '/' || true)
            BASE_IMAGES+=$'\n'
          done
          BASE_IMAGES=$(echo "$BASE_IMAGES" | sort -u)

          # Only scan images that are new or changed compared to base
          # Strip @sha256:... digests for comparison so digest pins don't trigger rescans
          BASE_IMAGES_STRIPPED=$(echo "$BASE_IMAGES" | sed 's/@sha256:[a-f0-9]*//' | sort -u)

          IMAGES=""
          for img in $HEAD_IMAGES; do
            img_stripped=$(echo "$img" | sed 's/@sha256:[a-f0-9]*//')
            if echo "$BASE_IMAGES_STRIPPED" | grep -qxF "$img_stripped"; then
              echo "Skipping $img (same image:tag exists on base branch)"
            else
              IMAGES+="$img"$'\n'
            fi
          done
          IMAGES=$(echo "$IMAGES" | sed '/^$/d' | sort -u)

          if [ -z "$IMAGES" ]; then
            echo "No new or changed image references to scan."
            exit 0
          fi

          echo "Found new/changed image references to scan:"
          echo "$IMAGES"
          echo "---"

          OVERALL_FAIL=0
          for img in $IMAGES; do
            echo ""
            echo "=== Scanning: $img ==="

            # Pull image as Docker tarball (crane pull saves OCI/Docker format with manifest.json)
            TARBALL=$(mktemp --suffix=.tar)
            if ! crane pull "$img" "$TARBALL" 2>&1; then
              echo "::error::Failed to pull $img from registry."
              OVERALL_FAIL=1
              rm -f "$TARBALL"
              continue
            fi

            OUTPUT_FILE=$(mktemp)
            osv-scanner scan image --archive "$TARBALL" > "$OUTPUT_FILE" 2>&1 || true
            cat "$OUTPUT_FILE"
            rm -f "$TARBALL"

            SUMMARY_LINE=$(grep 'Total .* packages affected by' "$OUTPUT_FILE" || true)

            if [ -z "$SUMMARY_LINE" ]; then
              echo "No vulnerabilities found for $img."
              rm -f "$OUTPUT_FILE"
              continue
            fi

            FIXABLE_LINE=$(grep 'vulnerabilities can be fixed' "$OUTPUT_FILE" || true)
            FIXABLE_COUNT=$(echo "$FIXABLE_LINE" | grep -oE '^[0-9]+' || echo "0")
            FIXABLE_COUNT=${FIXABLE_COUNT:-0}

            get_count() {
              local count
              count=$(echo "$2" | grep -o "[0-9]* $1" | awk '{print $1}')
              echo "${count:-0}"
            }

            CRITICAL=$(get_count "Critical" "$SUMMARY_LINE")
            HIGH=$(get_count "High" "$SUMMARY_LINE")
            MEDIUM=$(get_count "Medium" "$SUMMARY_LINE")
            LOW=$(get_count "Low" "$SUMMARY_LINE")

            if [ "$FIXABLE_COUNT" -eq 0 ]; then
              echo "::notice::$img has vulnerabilities (Critical=$CRITICAL High=$HIGH Medium=$MEDIUM Low=$LOW) but none are fixable — skipping."
              rm -f "$OUTPUT_FILE"
              continue
            fi

            SHOULD_FAIL=0
            case "$FAIL_THRESHOLD" in
              low) if (( CRITICAL > 0 || HIGH > 0 || MEDIUM > 0 || LOW > 0 )); then SHOULD_FAIL=1; fi ;;
              medium) if (( CRITICAL > 0 || HIGH > 0 || MEDIUM > 0 )); then SHOULD_FAIL=1; fi ;;
              high) if (( CRITICAL > 0 || HIGH > 0 )); then SHOULD_FAIL=1; fi ;;
              critical) if (( CRITICAL > 0 )); then SHOULD_FAIL=1; fi ;;
            esac

            if [ "$SHOULD_FAIL" -eq 1 ]; then
              echo "::warning::$img has ${FAIL_THRESHOLD}+ severity vulnerabilities (Critical=$CRITICAL High=$HIGH Medium=$MEDIUM Low=$LOW) with $FIXABLE_COUNT fixable"
              OVERALL_FAIL=1
            fi

            rm -f "$OUTPUT_FILE"
          done

          if [ "$OVERALL_FAIL" -eq 1 ]; then
            echo "::error::One or more images have vulnerabilities at or above $FAIL_THRESHOLD severity."
            exit 1
          fi

          echo "All images passed vulnerability scan."
