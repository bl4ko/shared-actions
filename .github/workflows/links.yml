name: Check for broken links
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      SVC_TOKEN:
        required: true
  workflow_dispatch:
  schedule:
    - cron: "00 18 * * *"
jobs:
  linkChecker:
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    container:
      image: ubuntu:24.04
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y curl ca-certificates git

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install lychee
        run: |
          LYCHEE_VERSION="v0.18.0"
          curl -fsSL "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin lychee
          chmod +x /usr/local/bin/lychee

      - name: Link Checker
        id: lychee
        run: |
          mkdir -p lychee
          EXIT_CODE=0
          lychee --verbose --no-progress './**/*.md' './**/*.html' './**/*.rst' \
            --format markdown --output lychee/out.md || EXIT_CODE=$?
          echo "lychee_exit_code=${EXIT_CODE}" >> $GITHUB_ENV
        shell: bash

      - name: Create Issue From File
        if: env.lychee_exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
          token: ${{ secrets.SVC_TOKEN }}
